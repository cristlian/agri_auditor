stages:
  features:
    cmd: python -m agri_auditor features --data-dir ../provided_data --output workspace/pipeline_outputs/features.csv
    deps:
      - src/agri_auditor/cli.py
      - src/agri_auditor/features.py
      - src/agri_auditor/ingestion.py
      - ../provided_data/manifest.csv
      - ../provided_data/calibrations.json
    outs:
      - workspace/pipeline_outputs/features.csv
  events:
    cmd: python -m agri_auditor events --data-dir ../provided_data --features-csv workspace/pipeline_outputs/features.csv --output workspace/pipeline_outputs/events.json --disable-gemini
    deps:
      - src/agri_auditor/cli.py
      - src/agri_auditor/intelligence.py
      - workspace/pipeline_outputs/features.csv
      - ../provided_data/manifest.csv
      - ../provided_data/calibrations.json
    outs:
      - workspace/pipeline_outputs/events.json
  report:
    cmd: python -m agri_auditor report --data-dir ../provided_data --events-json workspace/pipeline_outputs/events.json --output workspace/pipeline_outputs/audit_report.html --report-mode split
    deps:
      - src/agri_auditor/cli.py
      - src/agri_auditor/reporting.py
      - workspace/pipeline_outputs/features.csv
      - workspace/pipeline_outputs/events.json
    outs:
      - workspace/pipeline_outputs/audit_report.html
      - workspace/pipeline_outputs/audit_report_assets
